[env:xiao_esp32s3_sense]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
monitor_port = COM5

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0

extra_scripts = pre:version.py

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
